model = "gpt-5.5"
approval_policy = "never"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_fill_form]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_evaluate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_run_code_unsafe]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]

[mcp_servers.chrome-devtools.tools.navigate_page]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.fill_form]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.click]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.get_network_request]
approval_mode = "approve"

[mcp_servers.chrome-devtools.tools.evaluate_script]
approval_mode = "approve"

[mcp_servers.supabase]
type = "http"
url = "https://mcp.supabase.com/mcp"

[mcp_servers.supabase.tools.apply_migration]
approval_mode = "approve"

[mcp_servers.postgresql-mcp]
command = "npx"
args = ["-y", "@henkey/postgres-mcp-server"]

[mcp_servers.postgresql-mcp.tools.pg_manage_schema]
approval_mode = "approve"

[mcp_servers.postgresql-mcp.tools.pg_analyze_database]
approval_mode = "approve"

[mcp_servers.postgresql-mcp.tools.pg_execute_query]
approval_mode = "approve"
