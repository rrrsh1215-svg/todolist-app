<svg width="760" height="720" viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="wf004-title wf004-desc">
  <title id="wf004-title">WF-004 TodoListApp 할일 등록/수정 화면</title>
  <desc id="wf004-desc">할일명, 설명, 종료예정일, 카테고리, 완료 여부를 입력하고 저장 또는 취소할 수 있는 화면 와이어프레임이다.</desc>
  <style>
    .page {
      fill: #f7f7f8;
    }
    .app-bar,
    .panel {
      fill: #ffffff;
      stroke: #222222;
      stroke-width: 1.3;
    }
    .field {
      fill: #f8fafc;
      stroke: #64748b;
      stroke-width: 1;
    }
    .textarea {
      fill: #f8fafc;
      stroke: #64748b;
      stroke-width: 1;
    }
    .button {
      fill: #dbeafe;
      stroke: #1d4ed8;
      stroke-width: 1.1;
    }
    .secondary {
      fill: #e5e7eb;
      stroke: #6b7280;
      stroke-width: 1;
    }
    .error {
      fill: #fee2e2;
      stroke: #b91c1c;
      stroke-width: 1;
    }
    .text {
      font-family: Arial, sans-serif;
      font-size: 15px;
      fill: #111111;
    }
    .small {
      font-family: Arial, sans-serif;
      font-size: 12px;
      fill: #333333;
    }
    .title {
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #111111;
    }
    .required {
      fill: #b91c1c;
      font-weight: 700;
    }
  </style>

  <rect class="page" x="0" y="0" width="760" height="720"/>

  <rect class="app-bar" x="32" y="24" width="696" height="58" rx="6"/>
  <text class="title" x="56" y="61">TodoListApp</text>
  <rect class="secondary" x="536" y="38" width="78" height="30" rx="4"/>
  <text class="small" x="575" y="58" text-anchor="middle">내 정보</text>
  <rect class="secondary" x="624" y="38" width="82" height="30" rx="4"/>
  <text class="small" x="665" y="58" text-anchor="middle">로그아웃</text>

  <rect class="panel" x="110" y="116" width="540" height="548" rx="8"/>
  <text class="title" x="146" y="160">할일 등록 / 수정</text>
  <text class="small" x="146" y="186">새 할일 등록과 기존 할일 수정에서 공통으로 사용하는 폼</text>

  <text class="text" x="146" y="232">할일명 <tspan class="required">*</tspan></text>
  <rect class="field" x="146" y="246" width="468" height="40" rx="4"/>
  <text class="small" x="162" y="271">예: 주간 보고서 작성</text>

  <text class="text" x="146" y="324">설명</text>
  <rect class="textarea" x="146" y="338" width="468" height="104" rx="4"/>
  <text class="small" x="162" y="364">예: 금요일 회의 전까지 초안 작성</text>

  <text class="text" x="146" y="480">종료예정일</text>
  <rect class="field" x="146" y="494" width="190" height="40" rx="4"/>
  <text class="small" x="162" y="519">YYYY-MM-DD</text>

  <text class="text" x="374" y="480">카테고리 <tspan class="required">*</tspan></text>
  <rect class="field" x="374" y="494" width="146" height="40" rx="4"/>
  <text class="small" x="390" y="519">일반</text>
  <text class="small" x="494" y="519">v</text>
  <rect class="button" x="532" y="494" width="82" height="40" rx="4"/>
  <text class="small" x="573" y="518" text-anchor="middle">+ 추가</text>

  <text class="text" x="146" y="572">완료 여부</text>
  <rect class="field" x="146" y="590" width="22" height="22" rx="3"/>
  <text class="small" x="180" y="607">완료</text>
  <text class="small" x="146" y="636">초기 등록 시 기본값은 미완료이며, 수정 시 완료 여부를 변경할 수 있다.</text>

  <rect class="error" x="146" y="652" width="258" height="28" rx="4"/>
  <text class="small" x="160" y="671">오류: 할일명과 카테고리는 필수입니다.</text>

  <rect class="secondary" x="438" y="642" width="76" height="38" rx="4"/>
  <text class="text" x="476" y="666" text-anchor="middle">취소</text>
  <rect class="button" x="530" y="642" width="84" height="38" rx="4"/>
  <text class="text" x="572" y="666" text-anchor="middle">저장</text>
</svg>
