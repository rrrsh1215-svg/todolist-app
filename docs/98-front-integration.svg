<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1180" viewBox="0 0 1440 1180" role="img" aria-labelledby="title desc">
  <title id="title">TodoListApp Frontend Integration Guide</title>
  <desc id="desc">docs/8-wireframe.md 화면 흐름을 기준으로 프론트엔드, 상태 관리, HTTP client, 백엔드 API 통합 관계를 설명하는 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; rx: 8; }
      .screen { fill: #f9fbff; stroke: #8aa1c1; stroke-width: 2; rx: 8; }
      .api { fill: #f5fff8; stroke: #72a982; stroke-width: 2; rx: 8; }
      .state { fill: #fff9ed; stroke: #d5a648; stroke-width: 2; rx: 8; }
      .warn { fill: #fff4f2; stroke: #d98272; stroke-width: 2; rx: 8; }
      .title { font: 700 28px Arial, "Noto Sans KR", sans-serif; fill: #172033; }
      .h2 { font: 700 19px Arial, "Noto Sans KR", sans-serif; fill: #172033; }
      .h3 { font: 700 16px Arial, "Noto Sans KR", sans-serif; fill: #24324a; }
      .text { font: 14px Arial, "Noto Sans KR", sans-serif; fill: #38445a; }
      .small { font: 12px Arial, "Noto Sans KR", sans-serif; fill: #5b667a; }
      .mono { font: 13px Consolas, "Courier New", monospace; fill: #2e3b52; }
      .pill { fill: #eef3f9; stroke: #c7d2e2; stroke-width: 1; rx: 14; }
      .line { stroke: #65758e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #a66b48; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow-warn); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#65758e" />
    </marker>
    <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a66b48" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1180" />

  <text class="title" x="48" y="58">TodoListApp 프론트엔드 통합 가이드</text>
  <text class="text" x="48" y="88">기준 문서: docs/8-wireframe.md · 대상 스택: React 19 + TypeScript + Zustand + TanStack Query</text>

  <rect class="panel" x="48" y="120" width="412" height="198" />
  <text class="h2" x="72" y="154">통합 환경</text>
  <text class="mono" x="72" y="190">VITE_API_BASE_URL=http://localhost:3000/api</text>
  <text class="mono" x="72" y="218">CORS_ORIGIN=http://localhost:5173</text>
  <text class="small" x="72" y="252">프론트 개발 서버 Origin과 백엔드 CORS_ORIGIN은 일치해야 한다.</text>
  <text class="small" x="72" y="278">Swagger UI: http://localhost:3000/api-docs</text>

  <rect class="warn" x="500" y="120" width="420" height="198" />
  <text class="h2" x="524" y="154">JWT 저장 정책</text>
  <text class="text" x="524" y="188">로그인 성공 시 JWT는 Zustand 메모리 상태에만 저장한다.</text>
  <text class="text" x="524" y="216">새로고침하면 토큰은 복원하지 않고 다시 로그인한다.</text>
  <text class="small" x="524" y="252">금지: localStorage, sessionStorage, 쿠키, URL query string</text>
  <text class="small" x="524" y="278">로그아웃/회원탈퇴/401 응답 시 authStore.clearAuth()</text>

  <rect class="state" x="960" y="120" width="432" height="198" />
  <text class="h2" x="984" y="154">공통 HTTP Client</text>
  <text class="text" x="984" y="188">컴포넌트에서 직접 fetch를 호출하지 않는다.</text>
  <text class="mono" x="984" y="218">Authorization: Bearer &lt;token&gt;</text>
  <text class="small" x="984" y="252">204 No Content는 JSON 파싱하지 않는다.</text>
  <text class="small" x="984" y="278">에러 응답: { code, message, details? }</text>

  <rect class="panel" x="48" y="358" width="1344" height="430" />
  <text class="h2" x="72" y="392">와이어프레임 기반 화면 통합 흐름</text>

  <rect class="screen" x="82" y="430" width="160" height="92" />
  <text class="h3" x="106" y="462">WF-002</text>
  <text class="text" x="106" y="488">회원가입</text>
  <text class="small" x="106" y="510">email/password/name</text>

  <rect class="screen" x="300" y="430" width="160" height="92" />
  <text class="h3" x="324" y="462">WF-001</text>
  <text class="text" x="324" y="488">로그인</text>
  <text class="small" x="324" y="510">JWT 발급</text>

  <rect class="screen" x="518" y="430" width="180" height="92" />
  <text class="h3" x="542" y="462">WF-003</text>
  <text class="text" x="542" y="488">할일 목록</text>
  <text class="small" x="542" y="510">필터/완료/편집/삭제</text>

  <rect class="screen" x="760" y="430" width="180" height="92" />
  <text class="h3" x="784" y="462">WF-004</text>
  <text class="text" x="784" y="488">할일 등록/수정</text>
  <text class="small" x="784" y="510">title/category 필수</text>

  <rect class="screen" x="1002" y="430" width="180" height="92" />
  <text class="h3" x="1026" y="462">WF-005</text>
  <text class="text" x="1026" y="488">카테고리 추가</text>
  <text class="small" x="1026" y="510">사용자별 카테고리</text>

  <rect class="screen" x="518" y="620" width="180" height="92" />
  <text class="h3" x="542" y="652">WF-006</text>
  <text class="text" x="542" y="678">내 정보</text>
  <text class="small" x="542" y="700">조회/수정/로그아웃</text>

  <rect class="screen" x="760" y="620" width="180" height="92" />
  <text class="h3" x="784" y="652">WF-007</text>
  <text class="text" x="784" y="678">탈퇴 확인</text>
  <text class="small" x="784" y="700">계정/할일/카테고리 삭제</text>

  <path class="line" d="M242 476 H300" />
  <path class="line" d="M460 476 H518" />
  <path class="line" d="M698 476 H760" />
  <path class="line" d="M940 476 H1002" />
  <path class="line" d="M1092 522 V560 H850 V620" />
  <path class="line" d="M850 620 V560 H608 V522" />
  <path class="line" d="M698 666 H760" />
  <path class="dash" d="M760 666 H700" />

  <rect class="pill" x="88" y="548" width="340" height="44" />
  <text class="small" x="108" y="575">신규 사용자: 회원가입 → 로그인 → 할일 목록 → 할일 등록</text>

  <rect class="pill" x="476" y="548" width="416" height="44" />
  <text class="small" x="496" y="575">기존 사용자: 로그인 → 할일 목록 → 필터/완료/편집/삭제</text>

  <rect class="pill" x="940" y="548" width="380" height="44" />
  <text class="small" x="960" y="575">카테고리: 할일 폼 → 카테고리 추가 → 할일 폼 복귀</text>

  <rect class="panel" x="48" y="828" width="646" height="268" />
  <text class="h2" x="72" y="862">화면별 API 매핑</text>
  <text class="mono" x="72" y="900">WF-001 로그인        POST /auth/login</text>
  <text class="mono" x="72" y="926">WF-002 회원가입      POST /auth/signup</text>
  <text class="mono" x="72" y="952">WF-003 할일 목록     GET /todos?categoryId&amp;dueDateFrom&amp;dueDateTo&amp;status</text>
  <text class="mono" x="72" y="978">WF-004 할일 폼       POST /todos · PATCH /todos/{todoId}</text>
  <text class="mono" x="72" y="1004">WF-005 카테고리      GET /categories · POST /categories</text>
  <text class="mono" x="72" y="1030">WF-006 내 정보       GET/PATCH /users/me · POST /auth/logout</text>
  <text class="mono" x="72" y="1056">WF-007 탈퇴 확인     DELETE /users/me</text>

  <rect class="panel" x="746" y="828" width="646" height="268" />
  <text class="h2" x="770" y="862">상태와 캐시 기준</text>

  <rect class="state" x="770" y="890" width="270" height="154" />
  <text class="h3" x="794" y="922">Zustand</text>
  <text class="text" x="794" y="952">authStore: token, user</text>
  <text class="text" x="794" y="980">todoFilterStore: 필터 상태</text>
  <text class="small" x="794" y="1010">로그아웃/탈퇴/401에서 인증 상태 제거</text>

  <rect class="api" x="1070" y="890" width="270" height="154" />
  <text class="h3" x="1094" y="922">TanStack Query</text>
  <text class="text" x="1094" y="952">["me"], ["categories"]</text>
  <text class="text" x="1094" y="980">["todos", filters]</text>
  <text class="small" x="1094" y="1010">mutation 성공 후 관련 query invalidate</text>

  <path class="line" d="M1040 967 H1070" />

  <rect class="warn" x="746" y="1118" width="646" height="34" />
  <text class="small" x="770" y="1140">오류 처리: 400 입력 오류, 401 로그인 이동, 404 빈 상태/찾을 수 없음, 409 중복 안내, 500 서버 오류 안내</text>
</svg>
